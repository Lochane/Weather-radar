name: api

services:
  api:
    build:
      context: ${PWD}/services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ${PWD}/services/api/src:/app/src
    environment:
      - DATABASE_URL=$DATABASE_URL
      - MINIO_ENDPOINT=$MINIO_ENDPOINT
    depends_on:
      postgres:
        condition: 'service_healthy'
    networks:
      - backend