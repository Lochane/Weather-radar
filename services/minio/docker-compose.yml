name: minio

services:
  minio:
    image: minio/minio:latest
    command: server /mnt/data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${HOME}/minio/data:/mnt/data
      - ${HOME}/minio/certs:/certs
      - ${HOME}/minio/minio.license:/minio.license
    healthcheck:
      test: ["CMD", "curl", "-I", "http://127.0.0.1:9001/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

volumes:
  minio_data:
