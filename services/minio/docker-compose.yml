name: minio

services:
  minio:
    image: minio/minio:latest
    command: server /mnt/data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${HOME}/minio/data:/mnt/data
      - ${HOME}/minio/certs:/certs
      - ${HOME}/minio/minio.license:/minio.license
    networks:
      - backend

volumes:
  minio_data:
